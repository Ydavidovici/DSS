# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name momentsbytemima.com www.momentsbytemima.com;
    # If you're about to run certbot, leave this as a simple redirect
    return 301 https://momentsbytemima.com$request_uri;
}

# HTTPS server (certbot will fill in certs)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name momentsbytemima.com www.momentsbytemima.com;

    # --- TLS will be injected by certbot ---
    # ssl_certificate     /etc/letsencrypt/live/momentsbytemima.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/momentsbytemima.com/privkey.pem;

    # Increase body size for photo uploads (matches your 200 MB app limit)
    client_max_body_size 210M;

    # Serve the SPA frontend
    root /srv/dss/apps/momentsByTemima/frontend/dist;
    index index.html;

    # Cache-busting for built static assets
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|webp|avif|svg|ico|ttf|otf|woff|woff2)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API and media proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # websockets and keepalive
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /media/ {
        proxy_pass         http://127.0.0.1:8000/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /media-deriv/ {
        proxy_pass         http://127.0.0.1:8000/media-deriv/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Optional: gzip text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;
}

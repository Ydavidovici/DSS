# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name momentsbytemima.com www.momentsbytemima.com;

    # Optional: allow certbot challenges without redirecting
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }

    return 301 https://momentsbytemima.com$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name momentsbytemima.com www.momentsbytemima.com;

    # certs go here (certbot will fill these)
    # ssl_certificate     /etc/letsencrypt/live/momentsbytemima.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/momentsbytemima.com/privkey.pem;

    # big uploads for photos
    client_max_body_size 210M;

    # Serve the built SPA
    root /root/srv/dss/apps/momentsByTemima/frontend/dist;
    index index.html;

    # Cache static build assets hard (immutable filenames)
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|webp|avif|svg|ico|ttf|otf|woff|woff2)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to FastAPI (listening on 127.0.0.1:8000)
    # This preserves the /api prefix as-is.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Media files proxied from FastAPI
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /media-deriv/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # gzip text-ish assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # Optional: basic security headers
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header X-Frame-Options SAMEORIGIN;
    # After TLS is confirmed working, enable HSTS (uncomment):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}

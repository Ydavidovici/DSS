server {
    listen      80;
    listen  [::]:80;
    server_name davidovicisoftware.com www.davidovicisoftware.com;

    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    server_name  davidovicisoftware.com www.davidovicisoftware.com;

    ssl_certificate     /etc/letsencrypt/live/davidovicisoftware.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidovicisoftware.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location = /_auth_verify {
            internal;
            proxy_pass http://auth-service:4000/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

    location /api/ {
        include /nginx/snippets/auth_gatekeeper.conf;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
    }

    access_log /var/log/nginx/davidovicisoftware.access.log;
    error_log  /var/log/nginx/davidovicisoftware.error.log warn;
}


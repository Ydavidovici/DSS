version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dss-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dss_database}
    volumes:
      - dss_postgres_data:/var/lib/postgresql/data

  db-service:
    image: ydavidovici/dss-db-service:latest
    build:
      context: ./apps/db-service
      dockerfile: Dockerfile
    container_name: dss-db-service
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dss_database}
    depends_on:
      - postgres

  auth-service:
    image: ydavidovici/dss-auth-service:latest
    build:
      context: ./apps/auth-service
      dockerfile: Dockerfile
    container_name: dss-auth-service
    environment:
      - DB_SERVICE_API_URL=http://db-service:4001/api/v1
      - DB_SERVICE_URL=http://db-service:4001
    depends_on:
      - db-service

  ds-frontend:
    build: ./apps/ds-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:4000
      - DB_SERVICE_URL=http://db-service:4001
    depends_on:
      - auth-service

volumes:
  dss_postgres_data: